name: Build & Deploy (GitHub Pages)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  ASTRO_TELEMETRY_DISABLED: '1'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Build (syncs entity from committed snapshot, then astro build)
        run: npm run build

      - name: Validate structured data (fail on invalid JSON-LD)
        run: npm run validate:schema

      - name: Secret hygiene grep (no keys in bundle)
        run: npm run check:secrets

      # Foundation Rule 5 — post-deploy machine-endpoint ping. Disabled: the
      # step only acts when AUTOPILOT_ALLOWLIST names endpoints (default empty).
      - name: Post-deploy ping (gated by AUTOPILOT_ALLOWLIST — no-op by default)
        run: node scripts/post-deploy-ping.mjs
        env:
          AUTOPILOT_ALLOWLIST: ${{ vars.AUTOPILOT_ALLOWLIST }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
